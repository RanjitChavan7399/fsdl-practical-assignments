<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | City Hospital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">🏥 City Hospital</a>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="register.html" class="btn-primary">Register</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="card">
            <div class="card-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your patient portal.</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-submit">Login to Dashboard</button>
            </form>
            <div id="message" class="message"></div>
            <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted);">
                Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Register here</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
